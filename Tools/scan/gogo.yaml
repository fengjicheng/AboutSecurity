id: gogo
name: gogo 端口扫描与指纹识别
description: "使用 gogo (chainreactors) 进行端口扫描和服务指纹识别，支持主动/被动指纹、nuclei POC、启发式扫描、超强性能，最小发包原则"
homepage: "https://github.com/chainreactors/gogo"
category: scan
binary: gogo
version_cmd: "gogo -v 2>&1 | head -1"

install:
  manual: "https://github.com/chainreactors/gogo/releases"

parameters:
  - name: target
    type: string
    description: "扫描目标（IP/CIDR，如 192.168.1.1/24）"
    required: true
  - name: ports
    type: string
    description: "端口配置（支持范围、预设标签：top1/top2/top3/common/win/db/all/- 等）"
    default: "top2"
  - name: mode
    type: string
    description: "扫描模式"
    default: "default"
    enum: ["default", "s", "ss", "sc"]
  - name: ping
    type: string
    description: "是否先进行 ping 探测（true/false）"
    default: "false"
    enum: ["true", "false"]
  - name: exploit
    type: string
    description: "漏洞利用等级（none/auto/finger/all）"
    default: "none"
    enum: ["none", "auto", "finger", "all"]
  - name: workflow
    type: string
    description: "使用预设 workflow（如 10/172/192 表示对应内网网段）"

command_template: |
  {{if .workflow}}-w {{.workflow}}{{else}}-i {{.target}}{{end}}
  -p {{.ports}}
  {{if ne .mode "default"}}-m {{.mode}}{{end}}
  {{if eq .ping "true"}}--ping{{end}}
  {{if ne .exploit "none"}}-e {{.exploit}}{{end}}
  --af
  -q

output:
  mode: file
  file_pattern: "*.dat1"
  parser: line
  line:
    skip_empty: true
    regex: "^\\[\\+\\]\\s+(.+?)\\s{2,}(.+?)\\s{2,}(.+?)\\s{2,}.*\\[(\\d+)\\]"
    fields:
      - { name: url, group: 1 }
      - { name: server, group: 2 }
      - { name: fingerprint, group: 3 }
      - { name: status, group: 4 }

findings_mapping:
  type: info
  severity: info
  target_field: url
  detail_template: "{{.url}} {{.server}} {{.fingerprint}} [{{.status}}]"

constraints:
  timeout: 600s
  max_concurrent: 1
