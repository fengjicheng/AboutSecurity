id: sqlmap
name: sqlmap SQL 注入检测
description: "使用 sqlmap 自动化检测和利用 SQL 注入漏洞，支持布尔盲注、时间盲注、报错注入、UNION 注入、堆叠查询，自动识别数据库类型"
homepage: "https://github.com/sqlmapproject/sqlmap"
category: poc
binary: sqlmap
version_cmd: "sqlmap --version"

install:
  pip: "pip3 install sqlmap"
  brew: "brew install sqlmap"
  manual: "git clone https://github.com/sqlmapproject/sqlmap.git"

parameters:
  - name: url
    type: string
    description: "目标 URL（含注入点参数），如 http://target.com/page?id=1"
    required: true
  - name: method
    type: string
    description: "HTTP 请求方法"
    default: "GET"
    enum: ["GET", "POST"]
  - name: data
    type: string
    description: "POST 请求数据（如 username=admin&password=test）"
  - name: cookie
    type: string
    description: "Cookie 字符串"
  - name: headers
    type: string
    description: "额外请求头（格式: Header1: Value1\\nHeader2: Value2）"
  - name: level
    type: string
    description: "测试等级（1-5，越高越全面但越慢）"
    default: "2"
    enum: ["1", "2", "3", "4", "5"]
  - name: risk
    type: string
    description: "风险等级（1-3，3 会使用 OR-based 注入）"
    default: "2"
    enum: ["1", "2", "3"]
  - name: technique
    type: string
    description: "注入技术（B=布尔盲注, T=时间盲注, E=报错, U=UNION, S=堆叠, Q=内联查询）"
    default: "BEUSTQ"
  - name: dbms
    type: string
    description: "指定后端数据库类型"
    enum: ["MySQL", "Oracle", "PostgreSQL", "Microsoft SQL Server", "SQLite", "Microsoft Access"]
  - name: tamper
    type: string
    description: "指定 tamper 脚本（逗号分隔，如 space2comment,between）"
  - name: action
    type: string
    description: "执行动作"
    default: "detect"
    enum: ["detect", "dbs", "tables", "dump", "os-shell"]

command_template: |
  -u "{{.url}}"
  {{if eq .method "POST"}}--method POST{{end}}
  {{if .data}}--data "{{.data}}"{{end}}
  {{if .cookie}}--cookie "{{.cookie}}"{{end}}
  {{if .headers}}--headers "{{.headers}}"{{end}}
  --level {{.level}}
  --risk {{.risk}}
  --technique {{.technique}}
  {{if .dbms}}--dbms {{.dbms}}{{end}}
  {{if .tamper}}--tamper {{.tamper}}{{end}}
  {{if eq .action "dbs"}}--dbs{{end}}
  {{if eq .action "tables"}}--tables{{end}}
  {{if eq .action "dump"}}--dump{{end}}
  {{if eq .action "os-shell"}}--os-shell{{end}}
  --batch
  --random-agent
  --output-dir {{.WorkDir}}
  --flush-session

output:
  mode: stdout
  parser: line
  line:
    skip_empty: true
    skip_prefix: ["[INFO]", "[WARNING]"]

findings_mapping:
  type: vulnerability
  severity: high
  target_field: url
  detail_template: "SQL Injection detected"

constraints:
  timeout: 600s
  timeout_probe: 120s
  timeout_exploit: 600s
  proxy_flag: "--proxy"
  max_concurrent: 1
